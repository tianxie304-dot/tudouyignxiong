<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>迷你土豆兄弟 - Roguelite 生存</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #5c4a3d; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* 自定义滚动条和一些动画效果 */
        .upgrade-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-color: #fbbf24; }
        .upgrade-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="text-white select-none font-sans">

    <!-- 游戏画布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI 层 -->
    <div id="ui-layer" class="flex flex-col justify-between">
        <!-- 顶部信息栏 -->
        <div class="p-4 flex flex-col gap-2">
            <!-- 经验条 -->
            <div class="w-full max-w-2xl mx-auto flex items-center gap-3">
                <span class="font-bold text-yellow-400 text-xl drop-shadow-md">LV.<span id="levelDisplay">1</span></span>
                <div class="flex-grow h-4 bg-gray-800 rounded-full border-2 border-gray-600 overflow-hidden relative">
                    <div id="xpBar" class="h-full bg-blue-500 w-0 transition-all duration-200"></div>
                </div>
            </div>
            
            <!-- 状态信息 -->
            <div class="flex justify-between items-start max-w-4xl mx-auto w-full px-4">
                <div class="bg-black/40 px-4 py-2 rounded-lg border border-gray-700 backdrop-blur-sm shadow-lg">
                    <div class="text-red-400 font-bold text-lg">HP: <span id="hpDisplay">100</span> / <span id="maxHpDisplay">100</span></div>
                    <div class="w-32 h-2 bg-gray-800 rounded-full mt-1">
                        <div id="hpBar" class="h-full bg-red-500 rounded-full transition-all duration-200" style="width: 100%;"></div>
                    </div>
                </div>
                
                <div class="bg-black/40 px-6 py-2 rounded-lg border border-gray-700 backdrop-blur-sm text-center shadow-lg">
                    <div class="text-gray-400 text-sm">存活时间</div>
                    <div id="timerDisplay" class="text-2xl font-mono font-bold text-white tracking-widest">00:00</div>
                    <div class="text-yellow-500 text-sm mt-1">击杀: <span id="killCount">0</span></div>
                </div>
                
                <div class="bg-black/40 px-4 py-2 rounded-lg border border-gray-700 backdrop-blur-sm shadow-lg text-sm text-gray-300">
                    <div>伤害: <span id="statDmg" class="text-white">10</span></div>
                    <div>射速: <span id="statAspd" class="text-white">1.0</span>/s</div>
                    <div>弹射: <span id="statProj" class="text-white">1</span></div>
                </div>
            </div>
        </div>

        <!-- 底部提示 -->
        <div class="text-center text-gray-400 text-sm bg-black/40 py-2 rounded-t-xl w-max mx-auto px-8 backdrop-blur-sm">
            [W A S D] 移动 | 自动瞄准射击
        </div>
    </div>

    <!-- BOSS 降临倒计时警告 -->
    <div id="bossWarning" class="absolute top-1/4 left-1/2 transform -translate-x-1/2 text-5xl font-black text-red-500 animate-pulse hidden drop-shadow-[0_0_15px_rgba(255,0,0,1)] z-30 pointer-events-none text-center w-full">
        ⚠️ 强力 BOSS 将在 <span id="bossCountdown" class="text-7xl text-white">10</span> 秒后降临！⚠️
    </div>

    <!-- 升级面板 (默认隐藏) -->
    <div id="upgradePanel" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center interactive z-40 backdrop-blur-sm">
        <h2 class="text-5xl font-black text-yellow-400 mb-2 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]">等级提升！</h2>
        <p class="text-xl text-gray-300 mb-8">选择一个强化项目：</p>
        
        <div id="upgradeOptions" class="flex gap-6 max-w-5xl flex-wrap justify-center">
            <!-- 选项将通过 JS 动态生成 -->
        </div>
    </div>

    <!-- 游戏开始/结束屏幕 -->
    <div id="overlay" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center interactive z-50">
        <h1 id="mainTitle" class="text-7xl font-black text-orange-400 mb-6 tracking-wider" style="text-shadow: 0 5px 15px rgba(0,0,0,1);">迷你土豆兄弟</h1>
        <p id="subTitle" class="text-xl text-gray-300 mb-8 max-w-lg text-center leading-relaxed">在无穷无尽的异星生物中存活下来。<br>收集绿色宝石升级，构建你的最强流派！</p>
        
        <!-- 新增：角色选择区域 -->
        <div id="charSelectContainer" class="flex gap-4 mb-8 flex-wrap justify-center max-w-5xl hidden"></div>

        <button id="startBtn" class="px-10 py-4 bg-orange-500 hover:bg-orange-400 text-black font-bold rounded-2xl text-3xl transition-transform transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(249,115,22,0.6)]">
            开始生存
        </button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI 元素绑定
const uiLevel = document.getElementById('levelDisplay');
const uiXpBar = document.getElementById('xpBar');
const uiHp = document.getElementById('hpDisplay');
const uiMaxHp = document.getElementById('maxHpDisplay');
const uiHpBar = document.getElementById('hpBar');
const uiTimer = document.getElementById('timerDisplay');
const uiKills = document.getElementById('killCount');
const uiStatDmg = document.getElementById('statDmg');
const uiStatAspd = document.getElementById('statAspd');
const uiStatProj = document.getElementById('statProj');

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const mainTitle = document.getElementById('mainTitle');
const subTitle = document.getElementById('subTitle');

const upgradePanel = document.getElementById('upgradePanel');
const upgradeOptionsContainer = document.getElementById('upgradeOptions');
const charSelectContainer = document.getElementById('charSelectContainer');

const bossWarningUI = document.getElementById('bossWarning');
const bossCountdownUI = document.getElementById('bossCountdown');

// 游戏状态配置
let GAME_STATE = 'MENU'; // MENU, PLAYING, LEVELUP, GAMEOVER
let animationId;
let gameFrames = 0;
let survivalTime = 0;

// 相机和地图
let camera = { x: 0, y: 0, width: 0, height: 0 };
const MAP_SIZE = 4000; // 虚拟大地图

// 游戏实体集合
let player;
let enemies = [];
let bullets = [];
let enemyBullets = []; // 新增：记录敌方子弹
let gems = [];
let floatingTexts = [];
let particles = [];
let bossesSpawned = {}; // 新增 BOSS 生成记录

// 输入追踪
const keys = { w: false, a: false, s: false, d: false };

// 监听窗口大小变化
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    camera.width = canvas.width;
    camera.height = canvas.height;
}
window.addEventListener('resize', resize);
resize();

// --- 强化选项数据池 ---
const UPGRADE_POOL = [
    { id: 'dmg', name: '肌肉强化', desc: '伤害 +20%', icon: '💪', apply: (p) => p.damageMult += 0.20 },
    { id: 'aspd', name: '神经反射', desc: '攻击速度 +15%', icon: '⚡', apply: (p) => p.attackSpeedMult += 0.15 },
    { id: 'proj', name: '多重射击', desc: '子弹数量 +1', icon: '🎯', apply: (p) => p.projectiles += 1 },
    { id: 'hp', name: '基因突变', desc: '最大生命值 +25', icon: '❤️', apply: (p) => { p.maxHp += 25; p.hp += 25; } },
    { id: 'speed', name: '动力靴', desc: '移动速度 +15%', icon: '👟', apply: (p) => p.speed += p.baseSpeed * 0.15 },
    { id: 'pickup', name: '磁性体质', desc: '拾取范围 +30%', icon: '🧲', apply: (p) => p.pickupRange += p.basePickupRange * 0.30 },
    { id: 'pierce', name: '穿甲弹', desc: '子弹穿透力 +1', icon: '🏹', apply: (p) => p.pierce += 1 },
    { id: 'heal', name: '急救包', desc: '立即恢复 50% 生命值', icon: '🩹', apply: (p) => p.hp = Math.min(p.maxHp, p.hp + p.maxHp * 0.5) },
    // 新增的大量强化选项
    { id: 'regen', name: '细胞再生', desc: '每秒恢复 1 点生命', icon: '🌿', apply: (p) => p.hpRegen += 1 },
    { id: 'lifesteal', name: '吸血鬼之牙', desc: '击杀敌人有 5% 概率回血', icon: '🦇', apply: (p) => p.lifesteal += 0.05 },
    { id: 'xpmult', name: '智慧头脑', desc: '经验获取 +20%', icon: '🧠', apply: (p) => p.xpMult += 0.20 },
    { id: 'glasscannon', name: '玻璃大炮', desc: '伤害 +50%，最大生命 -30%', icon: '💥', apply: (p) => { p.damageMult += 0.50; p.maxHp = Math.max(1, Math.floor(p.maxHp * 0.7)); p.hp = Math.min(p.hp, p.maxHp); } },
    { id: 'tanky', name: '不坏之身', desc: '最大生命 +50，移速 -10%', icon: '🛡️', apply: (p) => { p.maxHp += 50; p.hp += 50; p.speed *= 0.9; } },
    { id: 'machinegun', name: '机枪手', desc: '攻速 +40%，伤害 -15%', icon: '🔫', apply: (p) => { p.attackSpeedMult += 0.40; p.damageMult -= 0.15; } },
    { id: 'multishot2', name: '散弹狂热', desc: '子弹 +2，伤害 -20%', icon: '🎇', apply: (p) => { p.projectiles += 2; p.damageMult -= 0.20; } },
];

// --- 角色数据池 ---
const CHARACTERS = [
    { id: 'balanced', name: '全能战士', desc: '各项属性均衡，适合新手。', color: '#eab308', stats: { hp: 100, speed: 4, damage: 15, cooldown: 60, proj: 1 } },
    { id: 'tank', name: '重装肉盾', desc: '血量极高，但移速和伤害稍低。', color: '#94a3b8', stats: { hp: 200, speed: 3.2, damage: 12, cooldown: 70, proj: 1 } },
    { id: 'shooter', name: '狂热枪手', desc: '射速极快，移速快，但很脆。', color: '#ef4444', stats: { hp: 60, speed: 4.8, damage: 10, cooldown: 30, proj: 1 } },
    { id: 'shotgun', name: '散弹大师', desc: '天生多重射击，但单发伤害低。', color: '#3b82f6', stats: { hp: 80, speed: 4, damage: 8, cooldown: 75, proj: 3 } },
    // 新增角色
    { id: 'assassin', name: '幽灵刺客', desc: '伤害极高移速极快，但一碰就碎。', color: '#14b8a6', stats: { hp: 30, speed: 5.5, damage: 25, cooldown: 40, proj: 1 } },
    { id: 'sniper', name: '神枪手', desc: '自带穿透伤害爆炸，但射速极慢。', color: '#8b5cf6', stats: { hp: 80, speed: 3.8, damage: 45, cooldown: 120, proj: 1, pierce: 2 } },
    { id: 'lucky', name: '拾荒者', desc: '超大拾取范围，更易获得经验。', color: '#f59e0b', stats: { hp: 100, speed: 4.2, damage: 12, cooldown: 60, proj: 1, pickup: 250 } },
    { id: 'berserker', name: '狂战士', desc: '攻速极快越战越勇，血量偏低。', color: '#b91c1c', stats: { hp: 70, speed: 4.5, damage: 18, cooldown: 25, proj: 1 } }
];
let selectedCharacter = CHARACTERS[0];

function showCharacterSelect() {
    mainTitle.textContent = "选择你的MT战士";
    mainTitle.className = "text-7xl font-black text-orange-400 mb-6 tracking-wider";
    subTitle.innerHTML = "前期难度已大幅降低，选择一个心仪的角色开始战斗吧！";
    startBtn.classList.add('hidden');
    charSelectContainer.classList.remove('hidden');
    charSelectContainer.innerHTML = '';
    
    CHARACTERS.forEach((char) => {
        const card = document.createElement('div');
        card.className = "bg-gray-800 border-2 border-gray-600 rounded-xl p-4 w-52 cursor-pointer flex flex-col items-center text-center transition-all hover:-translate-y-2 hover:shadow-[0_10px_20px_rgba(0,0,0,0.5)] hover:border-orange-500";
        card.innerHTML = `
            <div class="w-16 h-16 rounded-full mb-3 border-4 border-gray-700 shadow-inner" style="background-color: ${char.color}"></div>
            <h3 class="text-xl font-bold text-white mb-1">${char.name}</h3>
            <p class="text-xs text-gray-400 mb-3 h-8">${char.desc}</p>
            <div class="text-xs text-left w-full text-gray-300 bg-gray-900 p-2 rounded leading-relaxed">
                <div>❤️ 生命: <span class="text-green-400">${char.stats.hp}</span></div>
                <div>👟 移速: <span class="text-blue-400">${char.stats.speed}</span></div>
                <div>⚔️ 伤害: <span class="text-red-400">${char.stats.damage}</span></div>
                <div>🎯 弹射: <span class="text-yellow-400">${char.stats.proj}</span></div>
            </div>
        `;
        card.onclick = () => {
            selectedCharacter = char;
            initGame();
        };
        charSelectContainer.appendChild(card);
    });
}

// --- 游戏类定义 ---

class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 25;
        this.color = selectedCharacter.color; // 根据所选角色设置颜色
        
        // 基础属性
        this.baseSpeed = selectedCharacter.stats.speed;
        this.speed = this.baseSpeed;
        this.maxHp = selectedCharacter.stats.hp;
        this.hp = this.maxHp;
        
        // 战斗属性
        this.baseDamage = selectedCharacter.stats.damage;
        this.damageMult = 1.0; // 伤害倍率
        this.baseAttackCooldown = selectedCharacter.stats.cooldown; // 60帧 = 1秒
        this.attackSpeedMult = 1.0; // 攻速倍率
        this.attackTimer = 0;
        this.attackRange = 400;
        this.projectiles = selectedCharacter.stats.proj; // 弹丸数量
        this.pierce = selectedCharacter.stats.pierce || 0; // 穿透次数
        
        // 成长属性
        this.level = 1;
        this.xp = 0;
        this.xpNeeded = 10;
        this.basePickupRange = selectedCharacter.stats.pickup || 80;
        this.pickupRange = this.basePickupRange;
        this.kills = 0;
        
        // 新增特殊机制属性
        this.hpRegen = 0; // 每秒回血量
        this.lifesteal = 0; // 击杀吸血概率
        this.xpMult = 1.0; // 经验获取倍率

        // 表现属性
        this.facingRight = true;
        this.wobble = 0;
    }

    get actualDamage() { return this.baseDamage * this.damageMult; }
    get actualCooldown() { return Math.max(10, this.baseAttackCooldown / this.attackSpeedMult); }

    update() {
        if (this.hp <= 0) return;

        // 移动逻辑
        let dx = 0; let dy = 0;
        if (keys.w) dy -= 1;
        if (keys.s) dy += 1;
        if (keys.a) { dx -= 1; this.facingRight = false; }
        if (keys.d) { dx += 1; this.facingRight = true; }

        if (dx !== 0 || dy !== 0) {
            const length = Math.sqrt(dx * dx + dy * dy);
            this.x += (dx / length) * this.speed;
            this.y += (dy / length) * this.speed;
            this.wobble += 0.2; // 移动时的摇摆动画
        } else {
            this.wobble = 0;
        }

        // 限制在地图范围内
        this.x = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, this.y));

        // 每秒自动回血机制
        if (gameFrames % 60 === 0 && this.hpRegen > 0 && this.hp < this.maxHp) {
            this.hp = Math.min(this.maxHp, this.hp + this.hpRegen);
            floatingTexts.push(new FloatingText(this.x, this.y, `+${this.hpRegen}`, '#22c55e'));
        }

        // 自动射击逻辑
        this.attackTimer--;
        if (this.attackTimer <= 0) {
            this.autoShoot();
        }
    }

    autoShoot() {
        // 找最近的敌人
        let nearestDist = Infinity;
        let target = null;

        for (let e of enemies) {
            let d = Math.hypot(e.x - this.x, e.y - this.y);
            if (d < nearestDist && d <= this.attackRange) {
                nearestDist = d;
                target = e;
            }
        }

        if (target) {
            const baseAngle = Math.atan2(target.y - this.y, target.x - this.x);
            // 转身看向射击方向
            this.facingRight = Math.cos(baseAngle) > 0;

            // 多重射击的扇形散射角度
            const spreadAngle = 0.2; 
            const startAngle = baseAngle - (spreadAngle * (this.projectiles - 1)) / 2;

            for (let i = 0; i < this.projectiles; i++) {
                const angle = startAngle + i * spreadAngle;
                bullets.push(new Bullet(this.x, this.y, angle, this.actualDamage, this.pierce));
            }
            
            this.attackTimer = this.actualCooldown;
            
            // 射击后坐力小动画
            this.x -= Math.cos(baseAngle) * 3;
            this.y -= Math.sin(baseAngle) * 3;
        }
    }

    addXp(amount) {
        this.xp += amount * this.xpMult; // 应用经验倍率
        if (this.xp >= this.xpNeeded) {
            this.levelUp();
        }
    }

    levelUp() {
        this.level++;
        this.xp -= this.xpNeeded;
        this.xpNeeded = Math.floor(this.xpNeeded * 1.25 + 5); // 大幅降低升级难度 (从 1.5倍 降至 1.25倍)
        
        // 触发升级面板
        GAME_STATE = 'LEVELUP';
        showUpgradeMenu();
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 移动摇摆
        ctx.rotate(Math.sin(this.wobble) * 0.1);
        
        // 翻转处理
        if (!this.facingRight) {
            ctx.scale(-1, 1);
        }

        // --- 画一个“土豆兄弟”风格的主角模型 ---
        
        // 1. 身体 (椭圆)
        ctx.fillStyle = this.color; // 使用角色专属颜色
        ctx.strokeStyle = '#333'; // 统一加深边框
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 26, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // 2. 头带 (Rambo风格)
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(-19, -15, 38, 6);
        ctx.beginPath();
        ctx.moveTo(-19, -15);
        ctx.lineTo(-25, -20);
        ctx.lineTo(-23, -10);
        ctx.fill();

        // 3. 眼睛
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(6, -5, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(-6, -5, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // 眼珠
        ctx.fillStyle = 'black';
        ctx.beginPath(); ctx.arc(7, -5, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-5, -5, 2, 0, Math.PI * 2); ctx.fill();

        // 4. 嘴巴 (坚毅的倒U)
        ctx.beginPath();
        ctx.arc(0, 5, 4, Math.PI, 0);
        ctx.stroke();

        // 5. 拿枪的手
        ctx.fillStyle = '#eab308';
        ctx.beginPath(); ctx.arc(15, 10, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        
        // 枪械
        ctx.fillStyle = '#4b5563';
        ctx.fillRect(15, 5, 25, 8);
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(10, 5, 8, 12); // 握把

        // 拾取范围辅助光环 (非常微弱)
        ctx.scale(this.facingRight ? 1 : -1, 1); // 取消翻转画光环
        ctx.beginPath();
        ctx.arc(0, 0, this.pickupRange, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.fill();

        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, type, tier = 1) {
        this.x = x;
        this.y = y;
        this.type = type; // 0: 基础独眼怪, 1: 尖刺快跑怪, 2: 大肉盾, 3: BOSS
        this.tier = tier; // BOSS 阶级，决定技能强度
        this.hitFlash = 0;

        // 根据类型设置属性 - 降低前期难度，削减基础数值
        if (type === 3) { // 强力 BOSS
            this.radius = 50;
            this.speed = 1.4; 
            this.maxHp = 600 * (1 + player.level * 0.25); // 【修改】大幅削减 BOSS 血量及成长
            this.damage = 40; // 摸到就大出血
            this.color = '#dc2626'; // 猩红
            this.xpValue = 50; // 掉落海量经验
            this.skillCooldown = 120; // 技能初始冷却计时
        } else if (type === 1) { // 尖刺快跑怪
            this.radius = 15;
            this.speed = 2.0 + Math.random() * 0.5; // 减速
            this.maxHp = 15 * (1 + player.level * 0.08); // 减血
            this.damage = 5; // 减伤
            this.color = '#ef4444'; // 红
            this.xpValue = 1;
        } else if (type === 2) { // 大肉盾
            this.radius = 35;
            this.speed = 0.6 + Math.random() * 0.3;
            this.maxHp = 80 * (1 + player.level * 0.15);
            this.damage = 20;
            this.color = '#8b5cf6'; // 紫
            this.xpValue = 5;
        } else { // 基础独眼怪
            this.radius = 20;
            this.speed = 1.2 + Math.random() * 0.4; // 减速
            this.maxHp = 25 * (1 + player.level * 0.1); // 减血
            this.damage = 8; // 减伤
            this.color = '#10b981'; // 绿
            this.xpValue = 2;
        }
        
        this.hp = this.maxHp;
        this.wobble = Math.random() * Math.PI * 2;
    }

    takeDamage(amount) {
        this.hp -= amount;
        this.hitFlash = 5; // 受击闪烁帧数
        
        // 击退一小点
        const angle = Math.atan2(this.y - player.y, this.x - player.x);
        this.x += Math.cos(angle) * 10;
        this.y += Math.sin(angle) * 10;

        // 弹出伤害数字
        floatingTexts.push(new FloatingText(this.x, this.y - this.radius, Math.ceil(amount)));

        if (this.hp <= 0) {
            this.die();
        }
    }

    die() {
        player.kills++;
        
        // 触发吸血概率
        if (player.lifesteal > 0 && player.hp < player.maxHp && Math.random() < player.lifesteal) {
            player.hp = Math.min(player.maxHp, player.hp + 1);
            floatingTexts.push(new FloatingText(player.x, player.y, "+1", '#22c55e'));
        }

        createParticles(this.x, this.y, this.color, this.radius / 2);
        
        // 掉落经验
        gems.push(new Gem(this.x, this.y, this.xpValue));
        
        // 从数组中移除 (在主循环中处理)
    }

    update() {
        // 向玩家移动
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
        
        this.wobble += 0.1;
        if (this.hitFlash > 0) this.hitFlash--;

        // --- BOSS 技能释放逻辑 ---
        if (this.type === 3 && this.tier >= 2) {
            this.skillCooldown--;
            
            // 2阶以上 BOSS 放技能：八向弹幕
            if (this.skillCooldown <= 0) {
                for (let i = 0; i < 8; i++) {
                    const bulletAngle = (Math.PI * 2 / 8) * i + this.wobble; 
                    enemyBullets.push(new EnemyBullet(this.x, this.y, bulletAngle, 5, 15));
                }
                this.skillCooldown = 180; // 3秒冷却
            }
            
            // 3阶大后期 BOSS 追加技能：交错弹幕
            if (this.tier >= 3 && this.skillCooldown === 90) {
                for (let i = 0; i < 12; i++) {
                    const bulletAngle = (Math.PI * 2 / 12) * i - this.wobble;
                    enemyBullets.push(new EnemyBullet(this.x, this.y, bulletAngle, 6, 20));
                }
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 受击闪白光
        if (this.hitFlash > 0) {
            ctx.filter = 'brightness(200%)';
        }

        // 根据类型画不同的怪物模型
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 2;

        if (this.type === 3) {
            // BOSS 怪 (巨型猩红恶魔)
            const stretch = Math.sin(this.wobble) * 5;
            ctx.fillStyle = '#000'; // 黑色外圈光环
            ctx.beginPath(); ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(0, stretch, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            
            // 恶魔角
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.moveTo(-20, -this.radius+stretch); ctx.lineTo(-35, -this.radius - 20 + stretch); ctx.lineTo(-5, -this.radius+stretch); ctx.fill();
            ctx.beginPath(); ctx.moveTo(20, -this.radius+stretch); ctx.lineTo(35, -this.radius - 20 + stretch); ctx.lineTo(5, -this.radius+stretch); ctx.fill();
            
            // 发光红眼
            ctx.fillStyle = '#ff0000';
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000';
            ctx.beginPath(); ctx.ellipse(-15, -10 + stretch, 10, 5, Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(15, -10 + stretch, 10, 5, -Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            
            // 獠牙大嘴
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(0, 15 + stretch, 15, 0, Math.PI); ctx.fill();
            ctx.fillStyle = '#fff'; // 牙齿
            ctx.beginPath(); ctx.moveTo(-10, 15 + stretch); ctx.lineTo(-5, 25 + stretch); ctx.lineTo(0, 15 + stretch); ctx.fill();
            ctx.beginPath(); ctx.moveTo(10, 15 + stretch); ctx.lineTo(5, 25 + stretch); ctx.lineTo(0, 15 + stretch); ctx.fill();

        } else if (this.type === 1) {
            // 尖刺怪 (三角形底座)
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(0, -this.radius);
            ctx.lineTo(this.radius, this.radius);
            ctx.lineTo(-this.radius, this.radius);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            // 眼睛
            ctx.fillStyle = 'yellow';
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
            
        } else if (this.type === 2) {
            // 肉盾怪 (带触角的方圆体)
            ctx.fillStyle = this.color;
            const stretch = Math.sin(this.wobble) * 5; // 呼吸效果
            ctx.fillRect(-this.radius, -this.radius + stretch, this.radius*2, this.radius*2 - stretch);
            ctx.strokeRect(-this.radius, -this.radius + stretch, this.radius*2, this.radius*2 - stretch);
            // 触角
            ctx.beginPath(); ctx.moveTo(-15, -this.radius+stretch); ctx.lineTo(-25, -this.radius-10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(15, -this.radius+stretch); ctx.lineTo(25, -this.radius-10); ctx.stroke();
            // 多只眼睛
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(-10, stretch, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, stretch, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.arc(-10, stretch, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, stretch, 2, 0, Math.PI*2); ctx.fill();

        } else {
            // 基础独眼怪 (随行走的弹跳圆)
            const bounce = Math.abs(Math.sin(this.wobble)) * 5;
            ctx.translate(0, -bounce);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            
            // 独眼
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(0, -5, 10, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(0, -5, 4, 0, Math.PI * 2); ctx.fill();
        }

        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, angle, damage, pierce) {
        this.x = x;
        this.y = y;
        this.speed = 12;
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;
        this.radius = 4;
        this.damage = damage;
        this.pierce = pierce; // 穿透次数剩余
        this.hitEnemies = new Set(); // 记录打过的敌人，防止穿透时重复判定
        this.life = 60; // 存活帧数(防飞出地图一直存在)
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#fde047'; // 亮黄色子弹
        ctx.fill();
        
        // 拖尾
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - this.vx * 1.5, this.y - this.vy * 1.5);
        ctx.strokeStyle = 'rgba(253, 224, 71, 0.5)';
        ctx.lineWidth = this.radius * 1.5;
        ctx.stroke();
    }
}

// --- 新增：敌方子弹类 ---
class EnemyBullet {
    constructor(x, y, angle, speed, damage) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.radius = 6;
        this.damage = damage;
        this.life = 180; // 存活帧数
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ef4444'; // 红色子弹
        ctx.fill();
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ef4444'; // 红色发光
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

class Gem {
    constructor(x, y, value) {
        this.x = x + (Math.random()-0.5)*20; // 稍微散开
        this.y = y + (Math.random()-0.5)*20;
        this.value = value;
        this.radius = value > 2 ? 8 : 5; // 大经验块大一点
        this.color = value > 2 ? '#3b82f6' : '#22c55e'; // 蓝色=大经验，绿色=小经验
        this.wobble = Math.random() * Math.PI * 2;
        this.isMagnetic = false;
    }

    update() {
        // 磁吸效果：靠近玩家自动飞过去
        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if (dist < player.pickupRange || this.isMagnetic) {
            this.isMagnetic = true; // 一旦触发，就一直飞
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            // 速度随着距离缩小而加快
            const speed = Math.max(5, 300 / Math.max(1, dist)); 
            this.x += Math.cos(angle) * speed;
            this.y += Math.sin(angle) * speed;
        }
        this.wobble += 0.1;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.wobble);
        
        // 画菱形宝石
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.moveTo(0, -this.radius);
        ctx.lineTo(this.radius, 0);
        ctx.lineTo(0, this.radius);
        ctx.lineTo(-this.radius, 0);
        ctx.closePath();
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color = 'white') {
        this.x = x + (Math.random() - 0.5) * 20;
        this.y = y;
        this.text = text;
        this.color = color; // 支持自定义颜色
        this.life = 40;
        this.opacity = 1;
        this.vy = -1 - Math.random();
    }
    update() {
        this.y += this.vy;
        this.life--;
        this.opacity = this.life / 40;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.font = 'bold 20px sans-serif';
        ctx.fillStyle = this.color;
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 3;
        ctx.strokeText(this.text, this.x, this.y);
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, speed) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const vel = Math.random() * speed;
        this.vx = Math.cos(angle) * vel;
        this.vy = Math.sin(angle) * vel;
        this.life = 1;
        this.decay = Math.random() * 0.05 + 0.02;
        this.color = color;
        this.size = Math.random() * 4 + 2;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color, 6));
    }
}

// --- 游戏主逻辑 ---

function initGame() {
    player = new Player(MAP_SIZE/2, MAP_SIZE/2);
    enemies = [];
    bullets = [];
    enemyBullets = []; // 清空敌方子弹
    gems = [];
    floatingTexts = [];
    particles = [];
    bossesSpawned = { mid: false, late1: false, late2: false };
    
    gameFrames = 0;
    survivalTime = 0;
    
    GAME_STATE = 'PLAYING';
    overlay.classList.add('hidden');
    upgradePanel.classList.add('hidden');
    
    if (animationId) cancelAnimationFrame(animationId);
    gameLoop();
}

function spawnEnemies() {
    // 难度阶梯：根据生存时间调整刷怪频率 (延长到 10分钟/600秒)
    let spawnRate;
    if (survivalTime < 120) {
        // 前期（0-2分钟）：慢速刷新
        spawnRate = Math.max(15, 90 - Math.floor(survivalTime / 2)); 
    } else if (survivalTime < 300) {
        // 中期（2-5分钟）：刷新率激增
        spawnRate = Math.max(8, 40 - Math.floor((survivalTime - 120) / 4)); 
    } else if (survivalTime < 600) {
        // 后期（5-10分钟）：非常疯狂
        spawnRate = Math.max(4, 20 - Math.floor((survivalTime - 300) / 10));
    } else {
        // 大后期（10分钟后）：极限模式
        spawnRate = Math.max(1, 5 - Math.floor((survivalTime - 600) / 20));
    }
    
    if (gameFrames % spawnRate === 0) {
        // 决定生成什么类型的怪物
        let type = 0;
        const rand = Math.random();
        if (survivalTime > 30 && rand < 0.2) type = 1; 
        if (survivalTime > 90 && rand < 0.15) type = 2; // 延后大肉盾的出现时间到 90秒

        // 生成在屏幕外围的一个圆圈上
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.max(canvas.width, canvas.height) / 2 + 100;
        const ex = player.x + Math.cos(angle) * distance;
        const ey = player.y + Math.sin(angle) * distance;
        
        // 确保没有生在地图外面太远
        if (ex > 0 && ex < MAP_SIZE && ey > 0 && ey < MAP_SIZE) {
            enemies.push(new Enemy(ex, ey, type));
        }
    }

    // --- 强力 BOSS 生成逻辑 ---
    // 中期：2分钟 (120秒)
    // 后期：5分钟 (300秒)
    // 大后期：10分钟 (600秒)
    
    // 中期强力 BOSS (120秒出现 1只)
    if (survivalTime === 120 && !bossesSpawned.mid) {
        spawnBoss(1, 1); // 1阶BOSS（只会近战）
        bossesSpawned.mid = true;
    }
    // 后期多个 BOSS (300秒出现 2只)
    if (survivalTime === 300 && !bossesSpawned.late1) {
        spawnBoss(2, 2); // 2阶BOSS（会放8向弹幕）
        bossesSpawned.late1 = true;
    }
    // 大后期多个 BOSS (600秒出现 3只)
    if (survivalTime === 600 && !bossesSpawned.late2) {
        spawnBoss(3, 3); // 3阶BOSS（会放混合弹幕）
        bossesSpawned.late2 = true;
    }
}

function spawnBoss(count, tier) {
    for (let i = 0; i < count; i++) {
        // 让 Boss 出现在屏幕稍微远一点的地方
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.max(canvas.width, canvas.height) / 2 + 150;
        const ex = player.x + Math.cos(angle) * distance;
        const ey = player.y + Math.sin(angle) * distance;
        
        enemies.push(new Enemy(ex, ey, 3, tier)); // 3 是 BOSS 类型，tier 决定技能
    }
    
    // 飘字提示玩家
    floatingTexts.push(new FloatingText(player.x, player.y - 80, "⚠️ 强力BOSS出现！", '#ef4444'));
}

function updateCamera() {
    // 平滑跟随
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
}

function updateCollisions() {
    // 1. 子弹打敌人
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        let bulletAlive = true;

        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (b.hitEnemies.has(e)) continue; // 已经穿透过的不再造成伤害

            const dist = Math.hypot(b.x - e.x, b.y - e.y);
            if (dist < e.radius + b.radius) {
                e.takeDamage(b.damage);
                createParticles(b.x, b.y, '#fde047', 3);
                
                if (e.hp <= 0) {
                    enemies.splice(j, 1);
                }

                b.hitEnemies.add(e);
                if (b.hitEnemies.size > b.pierce) {
                    bulletAlive = false;
                    break;
                }
            }
        }

        if (!bulletAlive || b.life <= 0) {
            bullets.splice(i, 1);
        }
    }

    // 2. 敌人打玩家 (碰撞伤害)
    for (let e of enemies) {
        const dist = Math.hypot(e.x - player.x, e.y - player.y);
        if (dist < e.radius + player.radius) {
            // 简单的无敌帧控制，避免秒杀
            if (gameFrames % 15 === 0) {
                player.hp -= e.damage;
                createParticles(player.x, player.y, '#ef4444', 5); // 玩家流血粒子
                
                // 击退玩家一点点
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                player.x += Math.cos(angle) * 5;
                player.y += Math.sin(angle) * 5;
            }
        }
    }

    // --- 新增：敌方子弹打玩家 ---
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const eb = enemyBullets[i];
        const dist = Math.hypot(eb.x - player.x, eb.y - player.y);
        
        // 碰撞判定
        if (dist < eb.radius + player.radius) {
            player.hp -= eb.damage;
            createParticles(player.x, player.y, '#ef4444', 5);
            enemyBullets.splice(i, 1);
        } else if (eb.life <= 0) { // 销毁超时子弹
            enemyBullets.splice(i, 1);
        }
    }

    // 3. 玩家吃宝石
    for (let i = gems.length - 1; i >= 0; i--) {
        const g = gems[i];
        const dist = Math.hypot(player.x - g.x, player.y - g.y);
        if (dist < player.radius + g.radius) {
            player.addXp(g.value);
            gems.splice(i, 1);
            // 细微音效替代：可以加个粒子效果
            createParticles(g.x, g.y, '#a3e635', 2);
        }
    }
}

function drawBackground() {
    ctx.fillStyle = '#5c4a3d'; // 泥土色背景
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 画网格/地砖纹理增加移动感
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const step = 150;
    // 只画屏幕可见区域的网格以优化性能
    const startX = Math.floor(camera.x / step) * step;
    const startY = Math.floor(camera.y / step) * step;
    for (let x = startX; x < camera.x + canvas.width; x += step) {
        ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + canvas.height);
    }
    for (let y = startY; y < camera.y + canvas.height; y += step) {
        ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + canvas.width, y);
    }
    ctx.stroke();

    // 画地图边界
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 10;
    ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

    ctx.restore();
}

function updateUI() {
    // 经验条
    uiLevel.textContent = player.level;
    const xpPercent = (player.xp / player.xpNeeded) * 100;
    uiXpBar.style.width = `${xpPercent}%`;

    // 血条
    uiHp.textContent = Math.ceil(Math.max(0, player.hp));
    uiMaxHp.textContent = player.maxHp;
    uiHpBar.style.width = `${(player.hp / player.maxHp) * 100}%`;
    if (player.hp < player.maxHp * 0.3) uiHpBar.className = 'h-full rounded-full transition-all duration-200 bg-red-600 animate-pulse';
    else uiHpBar.className = 'h-full rounded-full transition-all duration-200 bg-green-500';

    // 时间与击杀
    const minutes = Math.floor(survivalTime / 60).toString().padStart(2, '0');
    const seconds = (survivalTime % 60).toString().padStart(2, '0');
    uiTimer.textContent = `${minutes}:${seconds}`;
    uiKills.textContent = player.kills;
    
    // --- BOSS 降临倒计时警告逻辑 ---
    let warningTime = 0;
    if (survivalTime >= 110 && survivalTime < 120) { // 2分钟 BOSS 预警
        warningTime = 120 - survivalTime;
    } else if (survivalTime >= 290 && survivalTime < 300) { // 5分钟 BOSS 预警
        warningTime = 300 - survivalTime;
    } else if (survivalTime >= 590 && survivalTime < 600) { // 10分钟 BOSS 预警
        warningTime = 600 - survivalTime;
    }

    if (warningTime > 0) {
        bossWarningUI.classList.remove('hidden');
        bossCountdownUI.textContent = warningTime;
    } else {
        bossWarningUI.classList.add('hidden');
    }

    // 属性面板
    uiStatDmg.textContent = player.actualDamage.toFixed(1);
    uiStatAspd.textContent = (60 / player.actualCooldown).toFixed(2);
    uiStatProj.textContent = player.projectiles;
}

function checkGameOver() {
    if (player.hp <= 0 && GAME_STATE === 'PLAYING') {
        GAME_STATE = 'GAMEOVER';
        
        mainTitle.textContent = "你变成了土豆泥";
        mainTitle.className = "text-6xl font-black text-red-500 mb-6 tracking-wider";
        
        const minutes = Math.floor(survivalTime / 60).toString().padStart(2, '0');
        const seconds = (survivalTime % 60).toString().padStart(2, '0');
        subTitle.innerHTML = `存活时间: <span class="text-white">${minutes}:${seconds}</span> | 达到等级: <span class="text-white">${player.level}</span> | 击杀异星生物: <span class="text-white">${player.kills}</span>`;
        
        charSelectContainer.classList.add('hidden'); // 隐藏角色选择
        startBtn.textContent = "重新尝试";
        startBtn.classList.remove('hidden'); // 显示重新开始按钮
        overlay.classList.remove('hidden');
    }
}

// --- 升级系统 ---

function showUpgradeMenu() {
    upgradeOptionsContainer.innerHTML = ''; // 清空
    
    // 随机选3个不重复的强化
    const shuffled = [...UPGRADE_POOL].sort(() => 0.5 - Math.random());
    const choices = shuffled.slice(0, 3);
    
    choices.forEach(opt => {
        const card = document.createElement('div');
        card.className = "upgrade-card bg-gray-800/90 border-2 border-gray-600 rounded-xl p-6 w-64 cursor-pointer flex flex-col items-center text-center";
        card.innerHTML = `
            <div class="text-5xl mb-4">${opt.icon}</div>
            <h3 class="text-2xl font-bold text-yellow-400 mb-2">${opt.name}</h3>
            <p class="text-gray-300 text-lg">${opt.desc}</p>
        `;
        card.onclick = () => {
            opt.apply(player);
            GAME_STATE = 'PLAYING';
            upgradePanel.classList.add('hidden');
            keys.w = keys.a = keys.s = keys.d = false; // 清除按键状态防乱跑
            
            // 播放个小粒子特效在玩家身上
            createParticles(player.x, player.y, '#fbbf24', 20);
        };
        upgradeOptionsContainer.appendChild(card);
    });
    
    upgradePanel.classList.remove('hidden');
}


// --- 循环 ---

function gameLoop() {
    if (GAME_STATE === 'PLAYING') {
        gameFrames++;
        if (gameFrames % 60 === 0) survivalTime++; // 每秒更新存活时间
        
        spawnEnemies();

        player.update();
        enemies.forEach(e => e.update());
        bullets.forEach(b => b.update());
        enemyBullets.forEach(eb => eb.update()); // 更新敌方子弹
        gems.forEach(g => g.update());
        particles.forEach(p => p.update());
        floatingTexts.forEach(t => t.update());
        
        // 清理死亡对象
        for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);
        for (let i = floatingTexts.length - 1; i >= 0; i--) if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);

        updateCamera();
        updateCollisions();
        checkGameOver();
        updateUI();
    }

    // 渲染 (不管暂停与否都渲染底图)
    drawBackground();

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 绘制顺序：经验 -> 敌人 -> 玩家 -> 子弹 -> 粒子 -> 伤害数字
    gems.forEach(g => g.draw());
    enemies.forEach(e => e.draw());
    player.draw();
    bullets.forEach(b => b.draw());
    enemyBullets.forEach(eb => eb.draw()); // 绘制敌方子弹
    particles.forEach(p => p.draw());
    floatingTexts.forEach(t => t.draw());

    ctx.restore();

    animationId = requestAnimationFrame(gameLoop);
}

// --- 事件监听 ---

window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (keys.hasOwnProperty(key)) keys[key] = true;
});

window.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (keys.hasOwnProperty(key)) keys[key] = false;
});

startBtn.addEventListener('click', () => {
    // 点击开始或重新尝试后，进入角色选择界面
    showCharacterSelect();
});

// 初始黑屏底色
ctx.fillStyle = '#222';
ctx.fillRect(0, 0, canvas.width, canvas.height);

</script>
